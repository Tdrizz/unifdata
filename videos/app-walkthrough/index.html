<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    body {
      margin: 0;
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: #f4f3f0;
    }
  </style>
</head>
<body>
  <!-- Root composition -->
  <div
    data-composition-id="root"
    data-width="1920"
    data-height="1080"
    data-start="0"
    data-duration="34"
    data-track-index="0"
  >
    <!-- Narration audio -->
    <audio
      id="narration"
      src="narration.wav"
      data-start="0"
      data-duration="29.5"
      data-track-index="2"
      data-volume="1"
    ></audio>

    <!-- Beat 1: Hook — 0–5.5s -->
    <div
      id="beat-1"
      data-composition-id="beat-1-hook"
      data-composition-src="compositions/beat-1-hook.html"
      data-start="0"
      data-duration="5.5"
      data-track-index="1"
      data-width="1920"
      data-height="1080"
    ></div>

    <!-- Beat 2: Dashboard — 5.5–12.5s -->
    <div
      id="beat-2"
      data-composition-id="beat-2-dashboard"
      data-composition-src="compositions/beat-2-dashboard.html"
      data-start="5.5"
      data-duration="7.0"
      data-track-index="1"
      data-width="1920"
      data-height="1080"
    ></div>

    <!-- Beat 3: Feature Sweep — 12.5–16.5s -->
    <div
      id="beat-3"
      data-composition-id="beat-3-feature-sweep"
      data-composition-src="compositions/beat-3-feature-sweep.html"
      data-start="12.5"
      data-duration="4.0"
      data-track-index="1"
      data-width="1920"
      data-height="1080"
    ></div>

    <!-- Beat 4: Quick Add — 16.5–20.0s -->
    <div
      id="beat-4"
      data-composition-id="beat-4-quick-add"
      data-composition-src="compositions/beat-4-quick-add.html"
      data-start="16.5"
      data-duration="3.5"
      data-track-index="1"
      data-width="1920"
      data-height="1080"
    ></div>

    <!-- Beat 5: Integrations — 20.0–24.5s -->
    <div
      id="beat-5"
      data-composition-id="beat-5-integrations"
      data-composition-src="compositions/beat-5-integrations.html"
      data-start="20.0"
      data-duration="4.5"
      data-track-index="1"
      data-width="1920"
      data-height="1080"
    ></div>

    <!-- Beat 6: Data Review — 24.5–27.5s -->
    <div
      id="beat-6"
      data-composition-id="beat-6-data-review"
      data-composition-src="compositions/beat-6-data-review.html"
      data-start="24.5"
      data-duration="3.0"
      data-track-index="1"
      data-width="1920"
      data-height="1080"
    ></div>

    <!-- Beat 7: Brand Close — 27.5–34.0s -->
    <div
      id="beat-7"
      data-composition-id="beat-7-brand-close"
      data-composition-src="compositions/beat-7-brand-close.html"
      data-start="27.5"
      data-duration="6.5"
      data-track-index="1"
      data-width="1920"
      data-height="1080"
    ></div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });
      window.__timelines["root"] = tl;
    </script>
  </div>
</body>
</html>
