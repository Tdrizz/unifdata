<template id="beat-6-data-review-template">
  <div data-composition-id="beat-6-data-review" data-width="1920" data-height="1080" data-start="0">
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap');

      [data-composition-id="beat-6-data-review"] {
        position: absolute;
        inset: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #f4f3f0;
        font-family: 'Geist', system-ui, sans-serif;
      }

      /* Radial shadow behind the card */
      [data-composition-id="beat-6-data-review"] .b6-bg-radial {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 1100px;
        height: 560px;
        background: radial-gradient(ellipse at center, rgba(23,22,20,0.07) 0%, transparent 70%);
        pointer-events: none;
        z-index: 0;
      }

      /* Grain overlay */
      [data-composition-id="beat-6-data-review"] .b6-grain {
        position: absolute;
        inset: 0;
        width: 1920px;
        height: 1080px;
        pointer-events: none;
        opacity: 0.03;
        z-index: 100;
      }

      /* Main card */
      [data-composition-id="beat-6-data-review"] .b6-card {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 880px;
        height: 380px;
        background: #ffffff;
        border-radius: 14px;
        border: 1px solid rgba(23,22,20,0.08);
        box-shadow:
          0 4px 24px rgba(23,22,20,0.10),
          0 1px 2px rgba(23,22,20,0.06),
          0 0 0 1px rgba(23,22,20,0.03);
        overflow: hidden;
        z-index: 2;
        opacity: 0;
      }

      /* Card header */
      [data-composition-id="beat-6-data-review"] .b6-card-header {
        padding: 18px 24px 14px 24px;
        border-bottom: 1px solid rgba(23,22,20,0.08);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      [data-composition-id="beat-6-data-review"] .b6-card-title {
        font-size: 11px;
        font-weight: 600;
        color: #6b6760;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      [data-composition-id="beat-6-data-review"] .b6-card-count {
        font-size: 11px;
        font-weight: 600;
        color: #a09b91;
        background: #f4f3f0;
        border-radius: 999px;
        padding: 3px 10px;
      }

      /* Rows container */
      [data-composition-id="beat-6-data-review"] .b6-rows {
        display: flex;
        flex-direction: column;
      }

      /* Each data row */
      [data-composition-id="beat-6-data-review"] .b6-row {
        display: flex;
        align-items: center;
        padding: 14px 20px;
        border-bottom: 1px solid rgba(23,22,20,0.08);
        gap: 0;
        opacity: 0;
      }

      [data-composition-id="beat-6-data-review"] .b6-row:last-child {
        border-bottom: none;
      }

      [data-composition-id="beat-6-data-review"] .b6-row-name {
        font-size: 14px;
        font-weight: 500;
        color: #171614;
        flex: 1;
      }

      [data-composition-id="beat-6-data-review"] .b6-row-source {
        font-size: 13px;
        font-weight: 400;
        color: #6b6760;
        flex: 1;
      }

      /* Badge */
      [data-composition-id="beat-6-data-review"] .b6-badge {
        font-size: 11px;
        font-weight: 600;
        padding: 4px 12px;
        border-radius: 999px;
        letter-spacing: 0.03em;
        flex-shrink: 0;
        background: #faf0e3;
        color: #92571b;
        transition: none;
      }

      [data-composition-id="beat-6-data-review"] .b6-badge.confirmed {
        background: #eef5ec;
        color: #3f7c3f;
      }

      /* Confirm all button */
      [data-composition-id="beat-6-data-review"] .b6-confirm-btn {
        display: block;
        margin: 18px auto 0 auto;
        width: 200px;
        height: 48px;
        background: #4A3FA8;
        color: #ffffff;
        font-family: 'Geist', system-ui, sans-serif;
        font-size: 14px;
        font-weight: 500;
        font-variation-settings: 'wght' 400;
        border: none;
        border-radius: 12px;
        cursor: default;
        letter-spacing: -0.01em;
        opacity: 0;
        box-shadow: 0 2px 8px rgba(74,63,168,0.28);
      }

      /* Narration words */
      [data-composition-id="beat-6-data-review"] .b6-narration {
        position: absolute;
        bottom: 140px;
        left: 120px;
        right: 120px;
        font-family: 'Geist', system-ui, sans-serif;
        font-size: 52px;
        font-weight: 500;
        color: #171614;
        line-height: 1.25;
        z-index: 8;
        display: flex;
        flex-wrap: wrap;
        align-items: flex-end;
        gap: 0;
      }

      [data-composition-id="beat-6-data-review"] .b6-word {
        display: inline-block;
        opacity: 0;
        margin-right: 16px;
      }
    </style>

    <!-- Radial shadow bg -->
    <div class="b6-bg-radial"></div>

    <!-- Grain -->
    <canvas class="b6-grain" id="b6-grain" width="1920" height="1080"></canvas>

    <!-- Review card -->
    <div class="b6-card" id="b6-card">

      <!-- Card header -->
      <div class="b6-card-header">
        <div class="b6-card-title">Staged import · 3 rows</div>
        <div class="b6-card-count">Ready</div>
      </div>

      <!-- Data rows -->
      <div class="b6-rows">

        <div class="b6-row" id="b6-row-0">
          <div class="b6-row-name">Marcus Johnson</div>
          <div class="b6-row-source">Referral</div>
          <div class="b6-badge" id="b6-badge-0">Ready to review</div>
        </div>

        <div class="b6-row" id="b6-row-1">
          <div class="b6-row-name">Sarah Chen</div>
          <div class="b6-row-source">Website</div>
          <div class="b6-badge" id="b6-badge-1">Ready to review</div>
        </div>

        <div class="b6-row" id="b6-row-2">
          <div class="b6-row-name">David Park</div>
          <div class="b6-row-source">HubSpot</div>
          <div class="b6-badge" id="b6-badge-2">Ready to review</div>
        </div>

      </div>

      <!-- Confirm button (scoped inside card for layout) -->
      <button class="b6-confirm-btn confirm-btn" id="b6-confirm-btn">Confirm all</button>

    </div>

    <!-- Narration -->
    <div class="b6-narration" id="b6-narration">
      <span class="b6-word" id="b6-w-then">Then</span><span class="b6-word" id="b6-w-review">review,</span><span class="b6-word" id="b6-w-confirm">confirm</span><span class="b6-word" id="b6-w-and">and</span><span class="b6-word" id="b6-w-merge">merge.</span><span class="b6-word" id="b6-w-no">No</span><span class="b6-word" id="b6-w-overwrites">overwrites.</span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        /* ---------- Deterministic grain (mulberry32) ---------- */
        var grainCanvas = document.getElementById('b6-grain');
        var grainCtx = grainCanvas.getContext('2d');
        function mulberry32(a) {
          return function () {
            a |= 0; a = a + 0x6D2B79F5 | 0;
            var t = Math.imul(a ^ a >>> 15, 1 | a);
            t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
            return ((t ^ t >>> 14) >>> 0) / 4294967296;
          };
        }
        var rng = mulberry32(0xB6D4A1);
        var imgData = grainCtx.createImageData(1920, 1080);
        var d = imgData.data;
        for (var i = 0; i < d.length; i += 4) {
          var v = Math.floor(rng() * 256);
          d[i] = v; d[i + 1] = v; d[i + 2] = v; d[i + 3] = 255;
        }
        grainCtx.putImageData(imgData, 0, 0);

        /* ---------- Element refs ---------- */
        var card     = document.getElementById('b6-card');
        var row0     = document.getElementById('b6-row-0');
        var row1     = document.getElementById('b6-row-1');
        var row2     = document.getElementById('b6-row-2');
        var badge0   = document.getElementById('b6-badge-0');
        var badge1   = document.getElementById('b6-badge-1');
        var badge2   = document.getElementById('b6-badge-2');
        var btn      = document.getElementById('b6-confirm-btn');

        /* ---------- Timeline ---------- */
        window.__timelines = window.__timelines || {};
        var tl = gsap.timeline({ paused: true });
        window.__timelines['beat-6-data-review'] = tl;

        /* ── 0.0s  Card enters: fade + slight scale-up ── */
        tl.fromTo(card,
          { opacity: 0, y: 20, scale: 0.97 },
          { opacity: 1, y: 0, scale: 1, duration: 0.5, ease: 'power2.out' },
          0.0
        );

        /* ── 0.1s  Rows stagger in from y:10 ── */
        tl.fromTo([row0, row1, row2],
          { opacity: 0, y: 10 },
          { opacity: 1, y: 0, duration: 0.35, ease: 'power2.out', stagger: 0.08 },
          0.1
        );

        /* ── 0.2s  Confirm button fades in ── */
        tl.fromTo(btn,
          { opacity: 0, y: 8 },
          { opacity: 1, y: 0, duration: 0.35, ease: 'power2.out' },
          0.38
        );

        /* ── VO word timings ── */
        var words = [
          { el: document.getElementById('b6-w-then'),      t: 0.00 },
          { el: document.getElementById('b6-w-review'),    t: 0.19 },
          { el: document.getElementById('b6-w-confirm'),   t: 0.64 },
          { el: document.getElementById('b6-w-and'),       t: 1.07 },
          { el: document.getElementById('b6-w-merge'),     t: 1.22 },
          { el: document.getElementById('b6-w-no'),        t: 1.72 },
          { el: document.getElementById('b6-w-overwrites'),t: 1.84 }
        ];
        words.forEach(function (w) {
          tl.fromTo(w.el,
            { opacity: 0, y: 12 },
            { opacity: 1, y: 0, duration: 0.3, ease: 'power2.out' },
            w.t
          );
        });

        /* ── 1.0s  Confirm button: variable font pulse wght 400→700→400 ── */
        tl.to(btn,
          { 'font-variation-settings': '"wght" 700', duration: 0.15, ease: 'power2.out' },
          1.0
        );
        tl.to(btn,
          { 'font-variation-settings': '"wght" 400', duration: 0.25, ease: 'power2.in' },
          1.15
        );

        /* ── 1.0s  Button subtle scale pulse ── */
        tl.fromTo(btn,
          { scale: 1 },
          { scale: 1.04, duration: 0.12, ease: 'power1.out', yoyo: true, repeat: 1 },
          1.0
        );

        /* ── 1.3s  Badge morph: "Ready to review" → "Confirmed" staggered 0.1s ── */
        /* Row 0 badge */
        tl.call(function () {
          badge0.textContent = 'Confirmed';
          badge0.classList.add('confirmed');
        }, null, 1.3);
        tl.fromTo(badge0,
          { scale: 0.88, opacity: 0.6 },
          { scale: 1, opacity: 1, duration: 0.22, ease: 'back.out(1.4)' },
          1.3
        );

        /* Row 1 badge */
        tl.call(function () {
          badge1.textContent = 'Confirmed';
          badge1.classList.add('confirmed');
        }, null, 1.4);
        tl.fromTo(badge1,
          { scale: 0.88, opacity: 0.6 },
          { scale: 1, opacity: 1, duration: 0.22, ease: 'back.out(1.4)' },
          1.4
        );

        /* Row 2 badge */
        tl.call(function () {
          badge2.textContent = 'Confirmed';
          badge2.classList.add('confirmed');
        }, null, 1.5);
        tl.fromTo(badge2,
          { scale: 0.88, opacity: 0.6 },
          { scale: 1, opacity: 1, duration: 0.22, ease: 'back.out(1.4)' },
          1.5
        );

        /* ── 2.0s  Row lift-off: rows scatter upward, staggered 0.15s ── */
        tl.fromTo(row0,
          { y: 0, opacity: 1 },
          { y: -80, opacity: 0, duration: 0.4, ease: 'power2.in' },
          2.0
        );
        tl.fromTo(row1,
          { y: 0, opacity: 1 },
          { y: -80, opacity: 0, duration: 0.4, ease: 'power2.in' },
          2.15
        );
        tl.fromTo(row2,
          { y: 0, opacity: 1 },
          { y: -80, opacity: 0, duration: 0.4, ease: 'power2.in' },
          2.3
        );

        /* ── 2.0s  Button fades after rows lift off ── */
        tl.fromTo(btn,
          { opacity: 1 },
          { opacity: 0, duration: 0.3, ease: 'power1.in' },
          2.1
        );

        /* ── 2.2s  Card background flashes #eef5ec then fades ── */
        tl.to(card,
          { backgroundColor: '#eef5ec', duration: 0.2, ease: 'power1.out' },
          2.2
        );
        tl.to(card,
          { backgroundColor: '#ffffff', duration: 0.35, ease: 'power1.inOut' },
          2.45
        );

        /* ── 2.5s  Card dims gently to show empty state ── */
        tl.to(card,
          { opacity: 0.55, duration: 0.5, ease: 'power1.inOut' },
          2.5
        );

      })();
    </script>
  </div>
</template>
