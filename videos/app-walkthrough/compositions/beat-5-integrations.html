    <style>

        position: relative;

      /* Ghost text */

        position: absolute;

      /* Integration cards row */

      [data-composition-id="beat-5-integrations"] .b5-card {

      [data-composition-id="beat-5-integrations"] .b5-counter-number {

      /* Narration captions */
      [data-composition-id="beat-5-integrations"] .b5-narration {

      [data-composition-id="beat-5-integrations"] .b5-word {

      }

      [data-composition-id="beat-5-integrations"] .b5-word.b5-accent {

      }

      [data-composition-id="beat-5-integrations"] .b5-word.b5-accent-orange {

        font-weight: 700;
      }

      [data-composition-id="beat-5-integrations"] .b5-word.b5-accent-green {
        color: #3f7c3f;
        font-weight: 700;
      }
    </style>

    <!-- Grain canvas -->
    <canvas class="b5-grain-canvas" id="b5-grain-canvas" width="1920" height="1080"></canvas>

    <!-- Ghost text -->
    <div class="b5-ghost-text">sync</div>

    <!-- SVG flow lines -->
    <svg class="b5-flow-svg" id="b5-flow-svg" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg" fill="none">
      <!-- Three curved paths from card centers down to a convergence point above the progress bar -->
      <!-- Card centers (approx): Stripe ~(760, 195), HubSpot ~(960, 195), Jobber ~(1160, 195) -->
      <!-- Convergence point: (960, 405) just above progress track at 414px -->
      <path id="b5-path-stripe"

      <path id="b5-path-hubspot"

      <path id="b5-path-jobber"

    <!-- Narration captions -->
    <div class="b5-narration" id="b5-narration">
      <span class="b5-word" id="b5-w-connect">Connect</span><span class="b5-word b5-accent" id="b5-w-stripe">Stripe,</span><span class="b5-word b5-accent-orange" id="b5-w-hubspot">HubSpot,</span><span class="b5-word" id="b5-w-or">or</span><span class="b5-word b5-accent-green" id="b5-w-jobber">Jobber</span><span class="b5-word" id="b5-w-dash">—</span><span class="b5-word" id="b5-w-your">your</span><span class="b5-word" id="b5-w-existing">existing</span><span class="b5-word" id="b5-w-records">records</span><span class="b5-word" id="b5-w-sync">sync</span><span class="b5-word" id="b5-w-in">in</span><span class="b5-word" id="b5-w-automatically">automatically.</span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        // --- Seeded PRNG (mulberry32) ---
        function mulberry32(seed) {
          return function () {
            seed |= 0;
            seed = (seed + 0x6D2B79F5) | 0;
            var t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
            t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
            return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
          };
        }

        var rand = mulberry32(97);

        // Pre-generate grain buffer
        var GRAIN_BUF_SIZE = 1920 * 1080;
        var grainBuf = new Uint8Array(GRAIN_BUF_SIZE);
        for (var gi = 0; gi < GRAIN_BUF_SIZE; gi++) {
          grainBuf[gi] = (rand() * 255) | 0;
        }

        window.__timelines = window.__timelines || {};
        var tl = gsap.timeline({ paused: true });

        var root = document.querySelector('[data-composition-id="beat-5-integrations"]');

        // Element refs
        var grainCanvas   = root.querySelector('#b5-grain-canvas');
        var cardStripe    = root.querySelector('#b5-card-stripe');
        var cardHubspot   = root.querySelector('#b5-card-hubspot');
        var cardJobber    = root.querySelector('#b5-card-jobber');
        var pathStripe    = root.querySelector('#b5-path-stripe');
        var pathHubspot   = root.querySelector('#b5-path-hubspot');
        var pathJobber    = root.querySelector('#b5-path-jobber');
        var progressTrack = root.querySelector('#b5-progress-track');
        var progressBar   = root.querySelector('#b5-progress-bar');
        var stagingTable  = root.querySelector('#b5-staging-table');
        var row1          = root.querySelector('#b5-row-1');
        var row2          = root.querySelector('#b5-row-2');
        var row3          = root.querySelector('#b5-row-3');
        var counterBlock  = root.querySelector('#b5-counter-block');
        var counterNumber = root.querySelector('#b5-counter-number');
        var pill          = root.querySelector('#b5-pill');

        // Word refs
        var wConnect     = root.querySelector('#b5-w-connect');
        var wStripe      = root.querySelector('#b5-w-stripe');
        var wHubspot     = root.querySelector('#b5-w-hubspot');
        var wOr          = root.querySelector('#b5-w-or');
        var wJobber      = root.querySelector('#b5-w-jobber');
        var wDash        = root.querySelector('#b5-w-dash');
        var wYour        = root.querySelector('#b5-w-your');
        var wExisting    = root.querySelector('#b5-w-existing');
        var wRecords     = root.querySelector('#b5-w-records');
        var wSync        = root.querySelector('#b5-w-sync');
        var wIn          = root.querySelector('#b5-w-in');
        var wAuto        = root.querySelector('#b5-w-automatically');

        // ----------------------------------------------------------------
        // GRAIN CANVAS — deterministic, proxy-driven
        // ----------------------------------------------------------------
        var grainCtx = grainCanvas.getContext('2d');
        var grainProxy = { frame: 0 };
        var totalDuration = 4.5;
        var FPS = 60;
        var totalFrames = Math.ceil(totalDuration * FPS);

        function drawGrainFrame(frameIndex) {
          var imageData = grainCtx.createImageData(1920, 1080);
          var data = imageData.data;
          var offset = (frameIndex * 97) % GRAIN_BUF_SIZE;
          for (var i = 0; i < 1920 * 1080; i++) {
            var idx = (i + offset) % GRAIN_BUF_SIZE;
            var v = grainBuf[idx];
            var p = i * 4;
            data[p]     = v;
            data[p + 1] = v;
            data[p + 2] = v;
            data[p + 3] = 255;
          }
          grainCtx.putImageData(imageData, 0, 0);
        }

        drawGrainFrame(0);

        tl.to(grainProxy, {
          frame: totalFrames - 1,
          duration: totalDuration,
          ease: 'none',
          onUpdate: function () {
            drawGrainFrame(Math.round(grainProxy.frame));
          }
        }, 0);

        // ----------------------------------------------------------------
        // SVG FLOW LINES — pre-compute stroke dasharray from path length
        // ----------------------------------------------------------------
        [pathStripe, pathHubspot, pathJobber].forEach(function (path) {
          var len = path.getTotalLength();
          path.style.strokeDasharray = len;
          path.style.strokeDashoffset = len;
        });

        // ----------------------------------------------------------------
        // CARD ENTRANCES (stagger from y:20 opacity:0)
        // ----------------------------------------------------------------
        tl.fromTo(cardStripe,
          { y: 20, opacity: 0 },
          { y: 0, opacity: 1, duration: 0.45, ease: 'power2.out' },
          0.0
        );

        tl.fromTo(cardHubspot,
          { y: 20, opacity: 0 },
          { y: 0, opacity: 1, duration: 0.45, ease: 'power2.out' },
          0.1
        );

        tl.fromTo(cardJobber,
          { y: 20, opacity: 0 },
          { y: 0, opacity: 1, duration: 0.45, ease: 'power2.out' },
          0.2
        );

        // ----------------------------------------------------------------
        // CARD PULSE — each pulses when its name is spoken in VO
        // Stripe at 0.48s, HubSpot at 1.00s, Jobber at 1.60s
        // ----------------------------------------------------------------
        // Stripe pulse
        tl.fromTo(cardStripe,
          { scale: 1 },
          { scale: 1.04, duration: 0.15, ease: 'power2.out', yoyo: true, repeat: 1 },
          0.48
        );

        // HubSpot pulse
        tl.fromTo(cardHubspot,
          { scale: 1 },
          { scale: 1.04, duration: 0.15, ease: 'power2.out', yoyo: true, repeat: 1 },
          1.00
        );

        // Jobber pulse
        tl.fromTo(cardJobber,
          { scale: 1 },
          { scale: 1.04, duration: 0.15, ease: 'power2.out', yoyo: true, repeat: 1 },
          1.60
        );

        // ----------------------------------------------------------------
        // SVG FLOW LINES — draw sequentially after cards appear, ~1.5s
        // ----------------------------------------------------------------
        tl.to(pathStripe, {
          strokeDashoffset: 0,
          duration: 0.5,
          ease: 'power2.out'
        }, 1.5);

        tl.to(pathHubspot, {
          strokeDashoffset: 0,
          duration: 0.5,
          ease: 'power2.out'
        }, 1.65);

        tl.to(pathJobber, {
          strokeDashoffset: 0,
          duration: 0.5,
          ease: 'power2.out'
        }, 1.8);

        // ----------------------------------------------------------------
        // PROGRESS BAR — appears at ~2.0s, fills over 1.5s
        // ----------------------------------------------------------------
        tl.fromTo(progressTrack,
          { opacity: 0 },
          { opacity: 1, duration: 0.2, ease: 'power1.out' },
          2.0
        );

        tl.fromTo(progressBar,
          { width: '0px' },
          { width: '580px', duration: 1.5, ease: 'power2.inOut' },
          2.05
        );

        // ----------------------------------------------------------------
        // STAGING TABLE — 3D perspective reveal (rotateX 20° → 0) at ~2.5s
        // ----------------------------------------------------------------
        tl.fromTo(stagingTable,
          { rotationX: 20, transformPerspective: 1800, opacity: 0 },
          { rotationX: 0, opacity: 1, duration: 0.8, ease: 'power2.out' },
          2.5
        );

        // Table rows stagger-fade in 0.15s apart
        tl.fromTo(row1,
          { opacity: 0, y: 8 },
          { opacity: 1, y: 0, duration: 0.3, ease: 'power2.out' },
          2.7
        );

        tl.fromTo(row2,
          { opacity: 0, y: 8 },
          { opacity: 1, y: 0, duration: 0.3, ease: 'power2.out' },
          2.85
        );

        tl.fromTo(row3,
          { opacity: 0, y: 8 },
          { opacity: 1, y: 0, duration: 0.3, ease: 'power2.out' },
          3.0
        );

        // ----------------------------------------------------------------
        // COUNTER — 0 → 247 over 1s at ~3.2s
        // ----------------------------------------------------------------
        tl.fromTo(counterBlock,
          { opacity: 0, y: 12 },
          { opacity: 1, y: 0, duration: 0.35, ease: 'power2.out' },
          3.1
        );

        var counterProxy = { val: 0 };
        tl.to(counterProxy, {
          val: 247,
          duration: 1.0,
          ease: 'power2.out',
          onUpdate: function () {
            counterNumber.textContent = Math.round(counterProxy.val);
          }
        }, 3.2);

        // ----------------------------------------------------------------
        // "NO OVERWRITES" PILL — slides in from right at ~3.8s
        // ----------------------------------------------------------------
        tl.fromTo(pill,
          { x: 80, opacity: 0 },
          { x: 0, opacity: 1, duration: 0.5, ease: 'power2.out' },
          3.8
        );

        // ----------------------------------------------------------------
        // NARRATION CAPTIONS — word-by-word synced to VO
        // Timings relative to beat start (global offset already subtracted)
        // ----------------------------------------------------------------
        var wordTimings = [
          { el: wConnect,  t: 0.00 },
          { el: wStripe,   t: 0.48 },
          { el: wHubspot,  t: 1.00 },
          { el: wOr,       t: 1.48 },
          { el: wJobber,   t: 1.60 },
          { el: wDash,     t: 1.70 },
          { el: wYour,     t: 1.87 },
          { el: wExisting, t: 2.11 },
          { el: wRecords,  t: 2.60 },
          { el: wSync,     t: 3.05 },
          { el: wIn,       t: 3.40 },
          { el: wAuto,     t: 3.51 }
        ];

        wordTimings.forEach(function (w) {
          tl.fromTo(
            w.el,
            { x: 14, y: 10, opacity: 0 },
            { x: 0, y: 0, opacity: 1, duration: 0.28, ease: 'power2.out' },
            w.t
          );
        });

        // ----------------------------------------------------------------
        // Register timeline
        // ----------------------------------------------------------------
        window.__timelines['beat-5-integrations'] = tl;
      })();
    </script>
  </div>
</template>
