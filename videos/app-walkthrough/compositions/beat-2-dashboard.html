    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        /* ---------- Grain (deterministic mulberry32) ---------- */
        var canvas = document.getElementById('b2-grain');
        var ctx = canvas.getContext('2d');
        function mulberry32(a) {
          return function () {
            a |= 0; a = a + 0x6D2B79F5 | 0;
            var t = Math.imul(a ^ a >>> 15, 1 | a);
            t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
            return ((t ^ t >>> 14) >>> 0) / 4294967296;
          };
        }
        var rng = mulberry32(0xDEADBEEF);
        var imgData = ctx.createImageData(1920, 1080);
        var d = imgData.data;
        for (var i = 0; i < d.length; i += 4) {
          var v = Math.floor(rng() * 256);
          d[i] = v; d[i+1] = v; d[i+2] = v; d[i+3] = 255;
        }
        ctx.putImageData(imgData, 0, 0);

        /* ---------- Timeline ---------- */
        window.__timelines = window.__timelines || {};
        var tl = gsap.timeline({ paused: true });
        window.__timelines['beat-2-dashboard'] = tl;

        /* --- 3D tilt on dashboard panel --- */
        tl.fromTo('.dashboard-panel',
          { rotationX: 12, transformPerspective: 1800 },
          { rotationX: 0, duration: 4, ease: 'power1.out' },
          0.1
        );

        /* --- Eyebrow --- */
        tl.fromTo('#b2-eyebrow',
          { opacity: 0, y: 10 },
          { opacity: 1, y: 0, duration: 0.4, ease: 'power2.out' },
          0.1
        );

        /* --- Greeting words: "Good morning." per-word --- */
        tl.fromTo('#b2-word-good',
          { opacity: 0, y: 20 },
          { opacity: 1, y: 0, duration: 0.45, ease: 'power2.out' },
          0.18
        );
        tl.fromTo('#b2-word-morning',
          { opacity: 0, y: 20 },
          { opacity: 1, y: 0, duration: 0.45, ease: 'power2.out' },
          0.37
        );

        /* --- Stat cards: all fade in simultaneously then count up --- */
        var cardIds = ['#b2-card-0','#b2-card-1','#b2-card-2','#b2-card-3','#b2-card-4'];
        tl.fromTo(cardIds,
          { opacity: 0, y: 16 },
          { opacity: 1, y: 0, duration: 0.5, ease: 'power2.out', stagger: 0.06 },
          0.68
        );

        /* Counter: Follow-ups due — integer 3 */
        var proxy0 = { val: 0 };
        var el0 = document.getElementById('b2-val-0');
        tl.to(proxy0, {
          val: 3, duration: 1.4, ease: 'power2.out',
          onUpdate: function () { el0.textContent = Math.round(proxy0.val); }
        }, 0.90);

        /* Counter: Jobs today — integer 4 */
        var proxy1 = { val: 0 };
        var el1 = document.getElementById('b2-val-1');
        tl.to(proxy1, {
          val: 4, duration: 1.4, ease: 'power2.out',
          onUpdate: function () { el1.textContent = Math.round(proxy1.val); }
        }, 0.90);

        /* Counter: Revenue MTD — $8,420 */
        var proxy2 = { val: 0 };
        var el2 = document.getElementById('b2-val-2');
        tl.to(proxy2, {
          val: 8420, duration: 1.5, ease: 'power2.out',
          onUpdate: function () {
            var v = Math.round(proxy2.val);
            el2.textContent = '$' + v.toLocaleString('en-US');
          }
        }, 0.90);

        /* Counter: Open pipeline — $24,000 */
        var proxy3 = { val: 0 };
        var el3 = document.getElementById('b2-val-3');
        tl.to(proxy3, {
          val: 24000, duration: 1.5, ease: 'power2.out',
          onUpdate: function () {
            var v = Math.round(proxy3.val);
            el3.textContent = '$' + v.toLocaleString('en-US');
          }
        }, 0.90);

        /* Counter: Unpaid sales — $1,200 */
        var proxy4 = { val: 0 };
        var el4 = document.getElementById('b2-val-4');
        tl.to(proxy4, {
          val: 1200, duration: 1.4, ease: 'power2.out',
          onUpdate: function () {
            var v = Math.round(proxy4.val);
            el4.textContent = '$' + v.toLocaleString('en-US');
          }
        }, 0.90);

        /* --- Panel backgrounds appear --- */
        tl.fromTo(['#b2-panel-queue','#b2-panel-jobs'],
          { opacity: 0, y: 12 },
          { opacity: 1, y: 0, duration: 0.5, ease: 'power2.out', stagger: 0.08 },
          1.42
        );

        /* --- Queue items stagger in --- */
        tl.fromTo(['#b2-qi-0','#b2-qi-1','#b2-qi-2'],
          { opacity: 0, x: -8 },
          { opacity: 1, x: 0, duration: 0.4, ease: 'power2.out', stagger: 0.12 },
          1.68
        );

        /* --- Job rows stagger in --- */
        tl.fromTo(['#b2-jr-0','#b2-jr-1'],
          { opacity: 0, x: -8 },
          { opacity: 1, x: 0, duration: 0.4, ease: 'power2.out', stagger: 0.12 },
          1.80
        );

      })();
    </script>
