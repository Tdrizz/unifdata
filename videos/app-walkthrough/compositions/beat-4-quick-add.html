<template id="beat-4-quick-add-template">
  <div data-composition-id="beat-4-quick-add" data-width="1920" data-height="1080" data-start="0">
    <style>
      [data-composition-id="beat-4-quick-add"] {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #f4f3f0;
        font-family: 'Geist', sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* Ghost oversized text behind card */
      [data-composition-id="beat-4-quick-add"] .b4-ghost-text {
        position: absolute;
        bottom: -60px;
        left: 50%;
        transform: translateX(-50%);
        font-family: 'Geist', sans-serif;
        font-weight: 900;
        font-size: 320px;
        color: rgba(74, 63, 168, 0.06);
        line-height: 1;
        white-space: nowrap;
        pointer-events: none;
        z-index: 1;
        user-select: none;
      }

      /* Aura glow behind card */
      [data-composition-id="beat-4-quick-add"] .b4-aura {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 600px;
        height: 600px;
        transform: translate(-50%, -50%);
        background: radial-gradient(circle, rgba(74, 63, 168, 0.06) 0%, transparent 70%);
        border-radius: 50%;
        pointer-events: none;
        z-index: 2;
      }

      /* Form card — centered via flexbox on root */
      [data-composition-id="beat-4-quick-add"] .b4-card {
        position: relative;
        width: 480px;
        height: 380px;
        background: #ffffff;
        border-radius: 14px;
        box-shadow: 0 8px 24px rgba(23, 22, 20, 0.08);
        padding: 32px 32px 28px;
        box-sizing: border-box;
        z-index: 5;
        display: flex;
        flex-direction: column;
        gap: 0;
        opacity: 0;
      }

      /* Card header */
      [data-composition-id="beat-4-quick-add"] .b4-card-header {
        font-family: 'Geist', sans-serif;
        font-weight: 600;
        font-size: 20px;
        color: #171614;
        margin-bottom: 22px;
        line-height: 1;
      }

      /* Field group */
      [data-composition-id="beat-4-quick-add"] .b4-field {
        display: flex;
        flex-direction: column;
        gap: 5px;
        margin-bottom: 14px;
      }

      [data-composition-id="beat-4-quick-add"] .b4-field:last-of-type {
        margin-bottom: 0;
      }

      [data-composition-id="beat-4-quick-add"] .b4-label {
        font-family: 'Geist', sans-serif;
        font-weight: 500;
        font-size: 12px;
        color: #6b6760;
        letter-spacing: 0.01em;
      }

      [data-composition-id="beat-4-quick-add"] .b4-input {
        height: 38px;
        border: 1px solid rgba(23, 22, 20, 0.14);
        border-radius: 10px;
        padding: 0 12px;
        font-family: 'Geist', sans-serif;
        font-weight: 400;
        font-size: 14px;
        color: #171614;
        background: #ffffff;
        box-sizing: border-box;
        display: flex;
        align-items: center;
        position: relative;
        line-height: 38px;
      }

      /* Blinking cursor */
      [data-composition-id="beat-4-quick-add"] .b4-cursor {
        display: inline-block;
        width: 1.5px;
        height: 14px;
        background: #4A3FA8;
        margin-left: 1px;
        vertical-align: middle;
        opacity: 0;
      }

      /* Phone value — hidden until reveal */
      [data-composition-id="beat-4-quick-add"] .b4-phone-value {
        opacity: 0;
      }

      /* Fake select */
      [data-composition-id="beat-4-quick-add"] .b4-select {
        height: 38px;
        border: 1px solid rgba(23, 22, 20, 0.14);
        border-radius: 10px;
        padding: 0 12px;
        font-family: 'Geist', sans-serif;
        font-weight: 400;
        font-size: 14px;
        color: #171614;
        background: #ffffff;
        box-sizing: border-box;
        display: flex;
        align-items: center;
        justify-content: space-between;
        opacity: 0;
      }

      [data-composition-id="beat-4-quick-add"] .b4-select-arrow {
        width: 10px;
        height: 10px;
        opacity: 0.4;
        flex-shrink: 0;
      }

      /* Save button */
      [data-composition-id="beat-4-quick-add"] .b4-save-btn {
        margin-top: 18px;
        width: 100%;
        height: 42px;
        background: #4A3FA8;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Geist', sans-serif;
        font-weight: 400;
        font-variation-settings: "wght" 400;
        font-size: 15px;
        color: #ffffff;
        position: relative;
        cursor: pointer;
        opacity: 0;
        user-select: none;
      }

      /* Checkmark SVG — positioned inside / overlapping button area */
      [data-composition-id="beat-4-quick-add"] .b4-checkmark-wrap {
        position: absolute;
        bottom: 28px;
        right: 32px;
        width: 28px;
        height: 28px;
        opacity: 0;
        z-index: 6;
      }

      /* Success tint overlay on card */
      [data-composition-id="beat-4-quick-add"] .b4-success-tint {
        position: absolute;
        inset: 0;
        border-radius: 14px;
        background: rgba(63, 124, 63, 0.08);
        pointer-events: none;
        opacity: 0;
        z-index: 1;
      }

      /* Narration */
      [data-composition-id="beat-4-quick-add"] .b4-narration {
        position: absolute;
        bottom: 140px;
        left: 120px;
        right: 120px;
        font-family: 'Geist', sans-serif;
        font-weight: 500;
        font-size: 56px;
        color: #171614;
        line-height: 1.25;
        z-index: 8;
        display: flex;
        flex-wrap: wrap;
        gap: 0;
        align-items: flex-end;
      }

      [data-composition-id="beat-4-quick-add"] .b4-word {
        display: inline-block;
        position: relative;
        opacity: 0;
        margin-right: 18px;
      }

      [data-composition-id="beat-4-quick-add"] .b4-word.b4-accent {
        color: #4A3FA8;
      }
    </style>

    <!-- Ghost text -->
    <div class="b4-ghost-text">add</div>

    <!-- Aura glow -->
    <div class="b4-aura" id="b4-aura"></div>

    <!-- Form card -->
    <div class="b4-card" id="b4-card">
      <!-- Success tint overlay -->
      <div class="b4-success-tint" id="b4-success-tint"></div>

      <div class="b4-card-header">New customer</div>

      <!-- Name field -->
      <div class="b4-field">
        <div class="b4-label">Name</div>
        <div class="b4-input" id="b4-name-input">
          <span id="b4-name-text"></span><span class="b4-cursor" id="b4-cursor"></span>
        </div>
      </div>

      <!-- Phone field -->
      <div class="b4-field">
        <div class="b4-label">Phone</div>
        <div class="b4-input" id="b4-phone-input">
          <span class="b4-phone-value" id="b4-phone-value">555-0142</span>
        </div>
      </div>

      <!-- Source field (fake select) -->
      <div class="b4-field">
        <div class="b4-label">Source</div>
        <div class="b4-select" id="b4-source-select">
          <span>Referral</span>
          <svg class="b4-select-arrow" viewBox="0 0 10 10" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M2 3.5L5 6.5L8 3.5" stroke="#171614" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>

      <!-- Save button -->
      <div class="b4-save-btn" id="b4-save-btn">
        Save customer
        <!-- Checkmark SVG inside button area -->
        <svg class="b4-checkmark-wrap" id="b4-checkmark" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg"
             style="position:absolute;right:-36px;top:50%;transform:translateY(-50%);">
          <circle cx="14" cy="14" r="12" stroke="#3f7c3f" stroke-width="2" fill="rgba(63,124,63,0.1)"/>
          <path id="b4-check-path" d="M8 14.5L12.5 19L20 10" stroke="#3f7c3f" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>

    <!-- Narration -->
    <div class="b4-narration" id="b4-narration">
      <span class="b4-word" id="b4-w-add">Add</span><span class="b4-word" id="b4-w-anything">anything</span><span class="b4-word" id="b4-w-in">in</span><span class="b4-word" id="b4-w-seconds">seconds</span><span class="b4-word" id="b4-w-with">with</span><span class="b4-word" id="b4-w-the">the</span><span class="b4-word b4-accent" id="b4-w-quick">quick-add</span><span class="b4-word" id="b4-w-forms">forms</span><span class="b4-word" id="b4-w-built">built</span><span class="b4-word" id="b4-w-into">into</span><span class="b4-word" id="b4-w-every">every</span><span class="b4-word" id="b4-w-page">page.</span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        window.__timelines = window.__timelines || {};

        var root = document.querySelector('[data-composition-id="beat-4-quick-add"]');

        var aura        = root.querySelector('#b4-aura');
        var card        = root.querySelector('#b4-card');
        var successTint = root.querySelector('#b4-success-tint');
        var nameText    = root.querySelector('#b4-name-text');
        var cursor      = root.querySelector('#b4-cursor');
        var phoneValue  = root.querySelector('#b4-phone-value');
        var sourceSelect = root.querySelector('#b4-source-select');
        var saveBtn     = root.querySelector('#b4-save-btn');
        var checkmark   = root.querySelector('#b4-checkmark');
        var checkPath   = root.querySelector('#b4-check-path');

        // Measure checkmark path length
        var pathLen = checkPath.getTotalLength ? checkPath.getTotalLength() : 28;
        checkPath.style.strokeDasharray  = pathLen;
        checkPath.style.strokeDashoffset = pathLen;

        // Build timeline
        var tl = gsap.timeline({ paused: true });

        // ----------------------------------------------------------------
        // AURA — breathes gently, finite repeat
        // 3.5s total; cycle 1.8s → repeat = ceil(3.5/1.8)-1 = 1
        // ----------------------------------------------------------------
        tl.fromTo(aura,
          { scale: 1 },
          { scale: 1.05, duration: 1.8, ease: 'sine.inOut', yoyo: true, repeat: 1 },
          0
        );

        // ----------------------------------------------------------------
        // CARD ENTRANCE — fade + slight rise
        // ----------------------------------------------------------------
        tl.fromTo(card,
          { y: 20, opacity: 0 },
          { y: 0, opacity: 1, duration: 0.5, ease: 'power2.out' },
          0.05
        );

        // ----------------------------------------------------------------
        // CURSOR APPEARS at 0.3s — blinks until ~1.7s then stops
        // One blink cycle = 0.24s (on/off). Period 0.3→1.7 = 1.4s → ~5.8 cycles
        // For initial on flicker we use a finite stagger trick via a proxy
        // ----------------------------------------------------------------
        // Cursor appears
        tl.fromTo(cursor,
          { opacity: 0 },
          { opacity: 1, duration: 0.05, ease: 'none' },
          0.3
        );

        // Blink loop during typing: 0.3→1.7s = 1.4s, blink half-period 0.12s
        // Total blink tweens in window: floor(1.4/0.24) = 5 full cycles
        var BLINK_HALF = 0.12;
        var blinkStart = 0.3;
        var blinkEnd   = 1.7;
        var blinkCount = Math.floor((blinkEnd - blinkStart) / (BLINK_HALF * 2)); // = 5 full cycles

        for (var b = 0; b < blinkCount; b++) {
          var bOff = blinkStart + b * BLINK_HALF * 2 + BLINK_HALF;
          var bOn  = blinkStart + (b + 1) * BLINK_HALF * 2;
          tl.fromTo(cursor,
            { opacity: 1 },
            { opacity: 0, duration: 0.05, ease: 'none' },
            bOff
          );
          if (bOn <= blinkEnd) {
            tl.fromTo(cursor,
              { opacity: 0 },
              { opacity: 1, duration: 0.05, ease: 'none' },
              bOn
            );
          }
        }

        // Post-typing: 3 more blinks after typing completes at ~1.7s
        // Blinks at 1.7, 1.82, 1.94 (off), 1.76, 1.88, 2.00 (on)
        var postBlinkStart = 1.7;
        var POST_BLINKS = 3;
        for (var pb = 0; pb < POST_BLINKS; pb++) {
          var pbOff = postBlinkStart + pb * BLINK_HALF * 2 + BLINK_HALF;
          var pbOn  = postBlinkStart + (pb + 1) * BLINK_HALF * 2;
          tl.fromTo(cursor,
            { opacity: 1 },
            { opacity: 0, duration: 0.05, ease: 'none' },
            pbOff
          );
          tl.fromTo(cursor,
            { opacity: 0 },
            { opacity: 1, duration: 0.05, ease: 'none' },
            pbOn
          );
        }

        // Final cursor hide at end of post-blink sequence
        var cursorFinalOff = postBlinkStart + POST_BLINKS * BLINK_HALF * 2 + BLINK_HALF;
        tl.fromTo(cursor,
          { opacity: 1 },
          { opacity: 0, duration: 0.05, ease: 'none' },
          cursorFinalOff
        );

        // ----------------------------------------------------------------
        // TYPING ANIMATION — "Marcus Johnson" char by char from 0.5s
        // 14 chars, 0.086s per char
        // ----------------------------------------------------------------
        var NAME = "Marcus Johnson";
        for (var i = 0; i < NAME.length; i++) {
          (function (idx) {
            tl.call(function () {
              nameText.textContent = NAME.substring(0, idx + 1);
            }, null, 0.5 + idx * 0.086);
          })(i);
        }

        // ----------------------------------------------------------------
        // PHONE VALUE — fade in at 1.9s
        // ----------------------------------------------------------------
        tl.fromTo(phoneValue,
          { opacity: 0 },
          { opacity: 1, duration: 0.25, ease: 'power1.out' },
          1.9
        );

        // ----------------------------------------------------------------
        // SOURCE SELECT — fade + slight rise at 2.1s
        // ----------------------------------------------------------------
        tl.fromTo(sourceSelect,
          { y: 6, opacity: 0 },
          { y: 0, opacity: 1, duration: 0.25, ease: 'power2.out' },
          2.1
        );

        // ----------------------------------------------------------------
        // SAVE BUTTON — fade in just before pulse
        // ----------------------------------------------------------------
        tl.fromTo(saveBtn,
          { opacity: 0 },
          { opacity: 1, duration: 0.2, ease: 'power1.out' },
          2.2
        );

        // ----------------------------------------------------------------
        // SAVE BUTTON VARIABLE FONT PULSE — wght 400 → 700 → 400 at 2.4s
        // ----------------------------------------------------------------
        tl.to(saveBtn,
          { 'font-variation-settings': '"wght" 700', duration: 0.15, ease: 'power2.out' },
          2.4
        );
        tl.to(saveBtn,
          { 'font-variation-settings': '"wght" 400', duration: 0.2, ease: 'power2.inOut' },
          2.55
        );

        // Also pulse bg brightness slightly
        tl.fromTo(saveBtn,
          { filter: 'brightness(1)' },
          { filter: 'brightness(1.12)', duration: 0.15, ease: 'power2.out' },
          2.4
        );
        tl.fromTo(saveBtn,
          { filter: 'brightness(1.12)' },
          { filter: 'brightness(1)', duration: 0.2, ease: 'power2.inOut' },
          2.55
        );

        // ----------------------------------------------------------------
        // CHECKMARK DRAW-IN at 2.7s
        // ----------------------------------------------------------------
        tl.fromTo(checkmark,
          { opacity: 0 },
          { opacity: 1, duration: 0.1, ease: 'none' },
          2.7
        );

        tl.fromTo(checkPath,
          { strokeDashoffset: pathLen },
          { strokeDashoffset: 0, duration: 0.35, ease: 'power2.out' },
          2.72
        );

        // ----------------------------------------------------------------
        // SUCCESS TINT FLASH on card at 2.8s — brief green wash
        // ----------------------------------------------------------------
        tl.fromTo(successTint,
          { opacity: 0 },
          { opacity: 1, duration: 0.12, ease: 'power1.out' },
          2.8
        );
        tl.fromTo(successTint,
          { opacity: 1 },
          { opacity: 0, duration: 0.4, ease: 'power2.out' },
          2.92
        );

        // ----------------------------------------------------------------
        // NARRATION — per-word kinetic type-on
        // Word timings (relative to beat start):
        //   add=0.0, anything=0.12, in=0.53, seconds=0.63, with=1.00
        //   the=1.22, quick=1.34, add=1.57, forms=1.75, built=2.00
        //   into=2.33, every=2.62, page.=2.98
        // Note: "quick" and "add" are combined as "quick-add" in one span
        // ----------------------------------------------------------------
        var wordTimings = [
          { id: 'b4-w-add',     t: 0.0  },
          { id: 'b4-w-anything',t: 0.12 },
          { id: 'b4-w-in',      t: 0.53 },
          { id: 'b4-w-seconds', t: 0.63 },
          { id: 'b4-w-with',    t: 1.00 },
          { id: 'b4-w-the',     t: 1.22 },
          { id: 'b4-w-quick',   t: 1.34 },
          { id: 'b4-w-forms',   t: 1.75 },
          { id: 'b4-w-built',   t: 2.00 },
          { id: 'b4-w-into',    t: 2.33 },
          { id: 'b4-w-every',   t: 2.62 },
          { id: 'b4-w-page',    t: 2.98 }
        ];

        wordTimings.forEach(function (w) {
          var el = root.querySelector('#' + w.id);
          tl.fromTo(el,
            { x: 20, y: 10, opacity: 0 },
            { x: 0, y: 0, opacity: 1, duration: 0.3, ease: 'power2.out' },
            w.t
          );
        });

        // ----------------------------------------------------------------
        // Register
        // ----------------------------------------------------------------
        window.__timelines['beat-4-quick-add'] = tl;
      })();
    </script>
  </div>
</template>
