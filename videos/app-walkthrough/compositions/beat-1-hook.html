    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        // --- Seeded PRNG (mulberry32) ---
        function mulberry32(seed) {
          return function () {
            seed |= 0;
            seed = (seed + 0x6D2B79F5) | 0;
            var t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
            t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
            return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
          };
        }

        var rand = mulberry32(42);

        // Pre-generate grain noise values so every seek to the same frame looks the same.
        // We'll cycle through a buffer rather than regenerating on each call.
        var GRAIN_BUF_SIZE = 1920 * 1080;
        var grainBuf = new Uint8Array(GRAIN_BUF_SIZE);
        for (var gi = 0; gi < GRAIN_BUF_SIZE; gi++) {
          grainBuf[gi] = (rand() * 255) | 0;
        }

        window.__timelines = window.__timelines || {};
        var tl = gsap.timeline({ paused: true });

        var root = document.querySelector('[data-composition-id="beat-1-hook"]');

        // Element refs
        var grainCanvas = root.querySelector('#b1-grain-canvas');
        var sticky = root.querySelector('#b1-sticky');
        var spreadsheet = root.querySelector('#b1-spreadsheet');
        var app1 = root.querySelector('#b1-app1');
        var app2 = root.querySelector('#b1-app2');
        var rule = root.querySelector('#b1-rule');

        // Word elements
        var words = {
          your:         root.querySelector('#b1-w-your'),
          business:     root.querySelector('#b1-w-business'),
          runs:         root.querySelector('#b1-w-runs'),
          across:       root.querySelector('#b1-w-across'),
          sticky:       root.querySelector('#b1-w-sticky'),
          notes:        root.querySelector('#b1-w-notes'),
          spreadsheets: root.querySelector('#b1-w-spreadsheets'),
          and:          root.querySelector('#b1-w-and'),
          three:        root.querySelector('#b1-w-three'),
          different:    root.querySelector('#b1-w-different'),
          apps:         root.querySelector('#b1-w-apps'),
          unifdata:     root.querySelector('#b1-w-unifdata'),
          pulls:        root.querySelector('#b1-w-pulls'),
          it:           root.querySelector('#b1-w-it'),
          into:         root.querySelector('#b1-w-into'),
          one:          root.querySelector('#b1-w-one')
        };

        // ----------------------------------------------------------------
        // GRAIN CANVAS — proxy-driven, deterministic
        // ----------------------------------------------------------------
        var grainCtx = grainCanvas.getContext('2d');
        var grainProxy = { frame: 0 };

        // Determine the total number of frames we'll need for 5.5s at 60fps
        var totalDuration = 5.5;
        var FPS = 60;
        var totalFrames = Math.ceil(totalDuration * FPS); // 330 frames

        // Draw grain for a given frame index (deterministic per frame, cycles)
        function drawGrainFrame(frameIndex) {
          var imageData = grainCtx.createImageData(1920, 1080);
          var data = imageData.data;
          var offset = (frameIndex * 73) % GRAIN_BUF_SIZE; // rotate buffer for per-frame variation
          for (var i = 0; i < 1920 * 1080; i++) {
            var idx = (i + offset) % GRAIN_BUF_SIZE;
            var v = grainBuf[idx];
            var p = i * 4;
            data[p]     = v;
            data[p + 1] = v;
            data[p + 2] = v;
            data[p + 3] = 255;
          }
          grainCtx.putImageData(imageData, 0, 0);
        }

        // Draw initial frame
        drawGrainFrame(0);

        tl.to(grainProxy, {
          frame: totalFrames - 1,
          duration: totalDuration,
          ease: 'none',
          onUpdate: function () {
            drawGrainFrame(Math.round(grainProxy.frame));
          }
        }, 0);

        // ----------------------------------------------------------------
        // FRAGMENT ENTRANCES
        // ----------------------------------------------------------------

        // Sticky note — enters from y:-80, power2.out
        tl.fromTo(sticky,
          { y: -80, opacity: 0 },
          { y: 0, opacity: 1, duration: 0.6, ease: 'power2.out' },
          0.05
        );

        // Spreadsheet — enters from x:60, power2.out
        tl.fromTo(spreadsheet,
          { x: 60, opacity: 0 },
          { x: 0, opacity: 1, duration: 0.7, ease: 'power2.out' },
          0.15
        );

        // App window 1 (lower-left) — floats in slowly
        tl.fromTo(app1,
          { y: 30, opacity: 0 },
          { y: 0, opacity: 0.4, duration: 0.9, ease: 'power1.out' },
          0.25
        );

        // App window 2 (upper-right) — floats in slowly
        tl.fromTo(app2,
          { x: 30, opacity: 0 },
          { x: 0, opacity: 0.4, duration: 0.9, ease: 'power1.out' },
          0.35
        );

        // ----------------------------------------------------------------
        // AMBIENT WOBBLE — finite repeat, on tl
        // duration: 5.5s total, cycle: 3s, so repeat = ceil(5.5/3)-1 = 1
        // ----------------------------------------------------------------
        var wobbleCycles = Math.ceil(5.5 / 3) - 1; // = 1

        // Sticky note rotationX wobble (breathe around its -8deg rotation)
        tl.fromTo(sticky,
          { rotationX: 0 },
          { rotationX: 2, duration: 1.5, ease: 'sine.inOut', yoyo: true, repeat: wobbleCycles },
          0.65
        );

        // Spreadsheet rotationX wobble
        tl.fromTo(spreadsheet,
          { rotationX: 0 },
          { rotationX: -2, duration: 1.5, ease: 'sine.inOut', yoyo: true, repeat: wobbleCycles },
          0.85
        );

        // App window 1 gentle float
        tl.fromTo(app1,
          { y: 0 },
          { y: -8, duration: 1.5, ease: 'sine.inOut', yoyo: true, repeat: wobbleCycles },
          1.15
        );

        // App window 2 gentle float
        tl.fromTo(app2,
          { y: 0 },
          { y: 8, duration: 1.5, ease: 'sine.inOut', yoyo: true, repeat: wobbleCycles },
          1.05
        );

        // ----------------------------------------------------------------
        // HORIZONTAL RULE — scaleX 0→1
        // ----------------------------------------------------------------
        tl.fromTo(rule,
          { scaleX: 0 },
          { scaleX: 1, duration: 0.8, ease: 'power2.out' },
          0.5
        );

        // ----------------------------------------------------------------
        // PER-WORD KINETIC TYPOGRAPHY
        // Slide decay: "Your" at 60px slide, decaying to ~10px for last words
        // 16 words total; interpolate slideAmt from 60 down to 10
        // ----------------------------------------------------------------
        var wordTimings = [
          { el: words.your,         t: 0.03,  slide: 60 },
          { el: words.business,     t: 0.18,  slide: 57 },
          { el: words.runs,         t: 0.55,  slide: 54 },
          { el: words.across,       t: 0.73,  slide: 50 },
          { el: words.sticky,       t: 1.01,  slide: 46 },
          { el: words.notes,        t: 1.29,  slide: 42 },
          { el: words.spreadsheets, t: 1.64,  slide: 38 },
          { el: words.and,          t: 2.31,  slide: 34 },
          { el: words.three,        t: 2.46,  slide: 30 },
          { el: words.different,    t: 2.79,  slide: 26 },
          { el: words.apps,         t: 3.31,  slide: 22 },
          { el: words.unifdata,     t: 3.79,  slide: 18 },
          { el: words.pulls,        t: 4.27,  slide: 16 },
          { el: words.it,           t: 4.50,  slide: 14 },
          { el: words.into,         t: 4.63,  slide: 12 },
          { el: words.one,          t: 4.86,  slide: 10 }
        ];

        wordTimings.forEach(function (w) {
          tl.fromTo(
            w.el,
            { x: w.slide, y: 14, opacity: 0 },
            { x: 0, y: 0, opacity: 1, duration: 0.35, ease: 'power2.out' },
            w.t
          );
        });

        // ----------------------------------------------------------------
        // Register on window
        // ----------------------------------------------------------------
        window.__timelines['beat-1-hook'] = tl;
      })();
    </script>
