    <!-- SVG connector lines (drawn after all panels land) -->

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        /* ── Seeded PRNG (mulberry32) — deterministic grain ── */
        function mulberry32(seed) {
          return function () {
            seed |= 0;
            seed = (seed + 0x6D2B79F5) | 0;
            var t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
            t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
            return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
          };
        }

        var rand = mulberry32(137);
        var GRAIN_BUF = 1920 * 1080;
        var grainBuf = new Uint8Array(GRAIN_BUF);
        for (var gi = 0; gi < GRAIN_BUF; gi++) { grainBuf[gi] = (rand() * 255) | 0; }

        window.__timelines = window.__timelines || {};
        var tl = gsap.timeline({ paused: true });

        var root = document.querySelector('[data-composition-id="beat-3-feature-sweep"]');

        /* ── Element refs ── */
        var grainCanvas  = root.querySelector('#b3-grain');
        var ghostCustomers = root.querySelector('#b3-ghost-customers');
        var ghostJobs      = root.querySelector('#b3-ghost-jobs');
        var ghostPipeline  = root.querySelector('#b3-ghost-pipeline');
        var ghostRevenue   = root.querySelector('#b3-ghost-revenue');

        var panelCustomers = root.querySelector('#b3-panel-customers');
        var panelJobs      = root.querySelector('#b3-panel-jobs');
        var panelPipeline  = root.querySelector('#b3-panel-pipeline');
        var panelSales     = root.querySelector('#b3-panel-sales');

        var line12 = root.querySelector('#b3-line-1-2');
        var line23 = root.querySelector('#b3-line-2-3');
        var line34 = root.querySelector('#b3-line-3-4');

        var bottomRule = root.querySelector('#b3-bottom-rule');

        /* ── Grain canvas ── */
        var grainCtx = grainCanvas.getContext('2d');
        var grainProxy = { frame: 0 };
        var TOTAL_DUR = 4.0;
        var FPS = 60;
        var TOTAL_FRAMES = Math.ceil(TOTAL_DUR * FPS);

        function drawGrainFrame(fi) {
          var imageData = grainCtx.createImageData(1920, 1080);
          var data = imageData.data;
          var offset = (fi * 97) % GRAIN_BUF;
          for (var i = 0; i < 1920 * 1080; i++) {
            var idx = (i + offset) % GRAIN_BUF;
            var v = grainBuf[idx];
            var p = i * 4;
            data[p]     = v;
            data[p + 1] = v;
            data[p + 2] = v;
            data[p + 3] = 255;
          }
          grainCtx.putImageData(imageData, 0, 0);
        }

        drawGrainFrame(0);

        tl.to(grainProxy, {
          frame: TOTAL_FRAMES - 1,
          duration: TOTAL_DUR,
          ease: 'none',
          onUpdate: function () { drawGrainFrame(Math.round(grainProxy.frame)); }
        }, 0);

        /* ── SVG stroke lengths (set dasharray/dashoffset) ── */
        /* Using fixed lengths since getTotalLength may not run until in DOM */
        /* line-1-2: M556,420 L580,420 → length = 24 */
        /* line-2-3: M960,420 L984,420 → length = 24 */
        /* line-3-4: M1364,420 L1388,420 → length = 24 */
        var connectorLines = [
          { el: line12, len: 24 },
          { el: line23, len: 24 },
          { el: line34, len: 24 }
        ];

        connectorLines.forEach(function (c) {
          c.el.setAttribute('stroke-dasharray', c.len);
          c.el.setAttribute('stroke-dashoffset', c.len);
        });

        /* ────────────────────────────────────────────────────────────
           PANEL 1 — CUSTOMERS — enters at t = 0.0s ("customer")
           Enters from y: -80, scale: 0.92
        ──────────────────────────────────────────────────────────── */
        tl.fromTo(ghostCustomers,
          { opacity: 0 },
          { opacity: 1, duration: 0.3, ease: 'power2.out' },
          0.0
        );

        tl.fromTo(panelCustomers,
          { y: -80, scale: 0.92, opacity: 0 },
          { y: 0, scale: 1, opacity: 1, duration: 0.25, ease: 'power3.out' },
          0.0
        );

        /* ────────────────────────────────────────────────────────────
           PANEL 2 — JOBS — enters at t = 0.87s ("job")
           Previous panel scales to 0.97 as this one arrives
        ──────────────────────────────────────────────────────────── */
        tl.fromTo(ghostJobs,
          { opacity: 0 },
          { opacity: 1, duration: 0.3, ease: 'power2.out' },
          0.87
        );

        tl.fromTo(panelCustomers,
          { scale: 1 },
          { scale: 0.97, duration: 0.2, ease: 'power2.out' },
          0.87
        );

        tl.fromTo(panelJobs,
          { y: -80, scale: 0.92, opacity: 0 },
          { y: 0, scale: 1, opacity: 1, duration: 0.25, ease: 'power3.out' },
          0.87
        );

        /* ────────────────────────────────────────────────────────────
           PANEL 3 — PIPELINE — enters at t = 1.56s ("lead")
           Previous panels scale to 0.97
        ──────────────────────────────────────────────────────────── */
        tl.fromTo(ghostPipeline,
          { opacity: 0 },
          { opacity: 1, duration: 0.3, ease: 'power2.out' },
          1.56
        );

        tl.fromTo([panelCustomers, panelJobs],
          { scale: 0.97 },
          { scale: 0.95, duration: 0.2, ease: 'power2.out' },
          1.56
        );

        tl.fromTo(panelPipeline,
          { y: -80, scale: 0.92, opacity: 0 },
          { y: 0, scale: 1, opacity: 1, duration: 0.25, ease: 'power3.out' },
          1.56
        );

        /* ────────────────────────────────────────────────────────────
           PANEL 4 — SALES — enters at t = 2.80s ("payment")
           All previous panels settle back toward full scale
        ──────────────────────────────────────────────────────────── */
        tl.fromTo(ghostRevenue,
          { opacity: 0 },
          { opacity: 1, duration: 0.3, ease: 'power2.out' },
          2.80
